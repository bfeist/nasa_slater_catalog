# =============================================================================
# Nginx config for the Slater Film Catalog web container
#
# Serves the Vite SPA for all non-API routes and reverse-proxies /api/* to
# the Express API container (hostname "api" inside the Docker network).
#
# The API container runs on its internal PORT (default 9301).
# =============================================================================

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip text assets
    gzip on;
    gzip_types text/plain text/css application/javascript application/json
               image/svg+xml application/wasm;
    gzip_min_length 1024;

    # Cache-bust: HTML never cached; other assets cached aggressively
    # (Vite appends a content hash to JS/CSS filenames)
    location ~* \.html$ {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        add_header Pragma "no-cache";
        add_header Expires "0";
        try_files $uri $uri/ /index.html;
    }

    # Static assets — Vite output includes content-hashed filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2?|ttf|eot|webp|avif)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Reverse-proxy all API traffic to the Express container
    location /api/ {
        proxy_pass http://api:9301;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";

        # Increase timeouts for video streaming endpoints
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;

        # Disable buffering for streaming responses (video, SSE)
        proxy_buffering off;
        proxy_request_buffering off;
    }

    # SPA fallback — any unmatched route serves index.html
    location / {
        try_files $uri $uri/ /index.html;
    }
}
