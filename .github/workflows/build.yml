name: A — Build and publish images

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  API_IMAGE: ${{ github.repository }}/catalog-api
  GATEWAY_IMAGE: ${{ github.repository }}/home-gateway

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - run: npm ci

      - run: npm run test:all

      - name: Compute release version
        id: ver
        run: echo "version=$(echo ${{ github.sha }} | cut -c1-12)" >> "$GITHUB_OUTPUT"

      - name: Upload SPA artifact
        uses: actions/upload-artifact@v4
        with:
          name: spa-${{ steps.ver.outputs.version }}
          path: .local/vite/dist
          retention-days: 14

      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - name: Build & push catalog API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/api/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.API_IMAGE }}:latest
          build-args: |
            RELEASE_VERSION=${{ steps.ver.outputs.version }}

      - name: Build & push home gateway image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/home-gateway/Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.GATEWAY_IMAGE }}:${{ steps.ver.outputs.version }}
            ${{ env.REGISTRY }}/${{ env.GATEWAY_IMAGE }}:latest
          build-args: |
            RELEASE_VERSION=${{ steps.ver.outputs.version }}
