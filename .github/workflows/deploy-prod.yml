name: C — Deploy production catalog

on:
  workflow_dispatch:
    inputs:
      release_version:
        description: "Release version (image tag from Workflow A)"
        required: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download SPA artifact
        uses: actions/download-artifact@v4
        with:
          name: spa-${{ inputs.release_version }}
          path: spa-dist

      - name: SSH deploy
        env:
          PROD_HOST: ${{ vars.PROD_HOST }}
          PROD_USER: ${{ vars.PROD_USER }}
          PROD_PATH_APPROOT: ${{ vars.PROD_PATH_APPROOT }}
          PROD_PATH_WEBROOT: ${{ vars.PROD_PATH_WEBROOT }}
          SSH_KEY: ${{ secrets.PROD_SSH_KEY }}
          IMAGE_TAG: ${{ inputs.release_version }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_KEY" > ~/.ssh/id_deploy && chmod 600 ~/.ssh/id_deploy
          ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

          # Push SPA build to host
          rsync -avz --delete -e "ssh -i ~/.ssh/id_deploy" \
            spa-dist/ "$PROD_USER@$PROD_HOST:$PROD_PATH_WEBROOT/"

          # Pull image, restart compose
          ssh -i ~/.ssh/id_deploy "$PROD_USER@$PROD_HOST" bash -se <<EOF
            set -e
            cd "$PROD_PATH_APPROOT"
            export RELEASE_VERSION="$IMAGE_TAG"
            docker compose -f compose.prod.yml pull
            docker compose -f compose.prod.yml up -d
            sudo systemctl reload nginx || true
            curl -fsS http://127.0.0.1:9311/api/stats | head -c 200
          EOF
